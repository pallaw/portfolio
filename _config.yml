# Site Settings
title: "Pallaw Pathak"
name: "Pallaw Pathak"
description: "Senior Android Engineer | Kotlin & Compose Multiplatform Expert | 10+ Years"
url: "https://pallawpathak.github.io"
baseurl: ""

# Author/Bio
author:
  name: "Pallaw Pathak"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Senior Android Engineer with over 10 years of experience specializing in Kotlin Multiplatform (KMP) and Compose Multiplatform. Proven expertise in clean architecture (MVVM/MVI), performance optimization, and Mobile DevOps (CI/CD with GitHub Actions)."
  location: "India"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/pallaw"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/pallawpathak"
    - label: "Medium"
      icon: "fab fa-fw fa-medium"
      url: "https://medium.com/@pallawpathak"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:pallaw.pathak@gmail.com"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/pallaw"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/pallawpathak"
    - label: "Medium"
      icon: "fab fa-fw fa-medium"
      url: "https://medium.com/@pallawpathak"

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:title/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# SEO
title_separator: "|"
description: "Senior Android Engineer with over 10 years of experience specializing in Kotlin Multiplatform (KMP) and Compose Multiplatform."
keywords: "Android, Kotlin, Kotlin Multiplatform, Compose Multiplatform, Mobile Development, Clean Architecture, MVVM, MVI"

# Social Sharing
twitter:
  username: pallawpathak
  card: summary_large_image

# Comments
comments: false

# Reading Files
include: ["_pages"]
keep_files: [".git", ".nojekyll"]

# Output
permalink: /:title/ 